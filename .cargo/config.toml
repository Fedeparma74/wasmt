[unstable]
build-std = ['std', 'panic_abort']

[build]
target = "wasm32-unknown-unknown"
rustflags = [
    '-C',
    'target-feature=+atomics,+bulk-memory,+mutable-globals',
    '-C',
    'link-arg=--shared-memory',
    '-C',
    'link-arg=--import-memory',
    '-C',
    'link-arg=--max-memory=4294967296',
    '-C',
    'link-arg=--export=__wasm_init_tls',
    '-C',
    'link-arg=--export=__tls_size',
    '-C',
    'link-arg=--export=__tls_align',
    '-C',
    'link-arg=--export=__tls_base',
]

[env]
# When building wasmt DIRECTLY (not as a dependency), set this to the
# consumer's npm package name. When wasmt is a dependency, this config
# file is NOT read — set the env var in the consumer's .cargo/config.toml
# or via shell instead.
WASMT_WASM_PKG = "../../wasm-bindgen-test"
